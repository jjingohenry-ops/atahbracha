name: Deploy Frontend (S3 + CloudFront)

on:
  push:
    branches: [main]
    paths:
      - frontend/**
      - .github/workflows/deploy-frontend-cloudfront.yml
      - scripts/deploy_frontend_cloudfront.sh
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  FRONTEND_BUCKET: ${{ vars.FRONTEND_BUCKET }}
  CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build Flutter web
        run: |
          set -euo pipefail
          cd frontend
          flutter pub get
          flutter build web --release

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync frontend to S3
        run: |
          set -euo pipefail
          test -n "$FRONTEND_BUCKET"
          aws s3 sync frontend/build/web/ "s3://${FRONTEND_BUCKET}/" --delete

      - name: Invalidate CloudFront cache
        run: |
          set -euo pipefail
          test -n "$CLOUDFRONT_DISTRIBUTION_ID"
          aws cloudfront create-invalidation --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" --paths "/*"
