name: Deploy Frontend (S3 + CloudFront)

on:
  push:
    branches: [main]
    paths:
      - frontend/**
      - .github/workflows/deploy-frontend-cloudfront.yml
      - scripts/deploy_frontend_cloudfront.sh
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  FRONTEND_BUCKET: ${{ vars.FRONTEND_BUCKET }}
  CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
  FRONTEND_API_ORIGIN: ${{ vars.FRONTEND_API_ORIGIN || 'http://atahbracha-alb-2058683693.us-east-1.elb.amazonaws.com' }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build Flutter web
        run: |
          set -euo pipefail
          cd frontend
          flutter pub get
          flutter build web --release --dart-define=API_ORIGIN="$FRONTEND_API_ORIGIN"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync frontend to S3
        run: |
          set -euo pipefail
          test -n "$FRONTEND_BUCKET"
          # Sync most files with normal caching (assets usually have hashes)
          aws s3 sync frontend/build/web/ "s3://${FRONTEND_BUCKET}/" --delete \
            --exclude "index.html" --exclude "flutter_service_worker.js" --exclude "version.json"
          
          # Sync entry point and service worker with strong no-cache headers so browsers instantly see updates
          aws s3 cp frontend/build/web/index.html "s3://${FRONTEND_BUCKET}/index.html" \
            --cache-control "max-age=0, no-cache, no-store, must-revalidate"
          
          if [ -f "frontend/build/web/flutter_service_worker.js" ]; then
            aws s3 cp frontend/build/web/flutter_service_worker.js "s3://${FRONTEND_BUCKET}/flutter_service_worker.js" \
              --cache-control "max-age=0, no-cache, no-store, must-revalidate"
          fi
          
          if [ -f "frontend/build/web/version.json" ]; then
            aws s3 cp frontend/build/web/version.json "s3://${FRONTEND_BUCKET}/version.json" \
              --cache-control "max-age=0, no-cache, no-store, must-revalidate"
          fi

      - name: Invalidate CloudFront cache
        run: |
          set -euo pipefail
          test -n "$CLOUDFRONT_DISTRIBUTION_ID"
          aws cloudfront create-invalidation --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" --paths "/*"
